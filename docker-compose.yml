version: '3.8'

services:
  agent-console:
    build: .
    container_name: agent-console
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_WS_URL=ws://localhost:4747
    restart: unless-stopped
    networks:
      - agent-network

  # Uncomment if you have a local agent-server
  # agent-server:
  #   build:
  #     context: ./agent-server
  #   container_name: agent-server
  #   ports:
  #     - "4747:4747"
  #   environment:
  #     - PORT=4747
  #   restart: unless-stopped
  #   networks:
  #     - agent-network

networks:
  agent-network:
    driver: bridge
